# ==============================================================================
# Laravel Location Configuration (for inclusion in nginx server block)
# ==============================================================================
# This file contains only location directives for use in shared server contexts
# It is included within an existing server { } block in Render's infrastructure
# ==============================================================================

# Health Check Endpoint (no auth, fast response)
location = /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# Metrics Endpoint (should be protected in production)
location = /metrics {
    access_log off;
    try_files $uri /index.php?$query_string;
}

# API Routes (stricter rate limiting)
location /api {
    try_files $uri /index.php?$query_string;
}

# Webhook Routes
location /webhooks {
    # Only allow POST requests
    limit_except POST {
        deny all;
    }
    
    try_files $uri /index.php?$query_string;
}

# Static Assets (long cache)
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    
    # Fallback to Laravel if asset not found
    try_files $uri /index.php?$query_string;
}

# Deny Access to Hidden Files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Deny Access to Sensitive Files
location ~ /(composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|\.env.*|phpunit\.xml|\.git)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Laravel Application Routing
location / {
    try_files $uri $uri/ /index.php?$query_string;
}

# PHP Processing via FastCGI
location ~ \.php$ {
    # Security: prevent executing files like test.php.txt
    try_files $uri =404;
    
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    include fastcgi_params;
}
